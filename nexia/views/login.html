<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexia - Iniciar sesión</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-md">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-800">NEXIA</h1>
        <p class="text-gray-500 mt-1">Sistema de Gestión de Socios</p>
    </div>
    <div id="errMsg" class="hidden bg-red-100 text-red-700 rounded p-3 mb-4 text-sm"></div>
    <form id="loginForm">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
            <input id="username" type="text" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="admin">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input id="password" type="password" required
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="••••••••">
        </div>
        <button type="submit"
            class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg transition">
            Ingresar
        </button>
    </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errDiv = document.getElementById('errMsg');
    errDiv.classList.add('hidden');

    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
        window.location.href = '/dashboard';
    } else {
        errDiv.textContent = data.error || 'Error al iniciar sesión';
        errDiv.classList.remove('hidden');
    }
});
</script>
</body>
</html>
