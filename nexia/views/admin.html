<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexia - Administracion</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">
<aside class="w-64 bg-blue-900 text-white flex flex-col min-h-screen fixed">
    <div class="p-6 border-b border-blue-700"><h1 class="text-2xl font-bold">NEXIA</h1><p class="text-blue-300 text-xs mt-1">Cooperadora Escolar</p></div>
    <nav class="flex-1 p-4 space-y-1">
        <a href="/dashboard"    class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#127968; Dashboard</a>
        <a href="/familias"     class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128106; Familias</a>
        <a href="/talones"      class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#129534; Talones</a>
        <a href="/pagos"        class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128179; Pagos</a>
        <a href="/conceptos"    class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128194; Conceptos</a>
        <a href="/contabilidad" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128202; Contabilidad</a>
        <a href="/admin"        class="flex items-center gap-3 px-4 py-2 rounded-lg bg-blue-700 font-medium">&#9881; Admin</a>
    </nav>
    <div class="p-4 border-t border-blue-700">
        <span id="userInfo" class="text-blue-300 text-sm"></span>
        <button onclick="logout()" class="mt-2 text-sm text-red-300 hover:text-red-200">Cerrar sesion</button>
    </div>
</aside>
<main class="ml-64 flex-1 p-8">
    <h2 class="text-2xl font-bold text-blue-900 mb-6">Administracion</h2>
    <div class="flex gap-4 mb-6 border-b border-gray-200">
        <button onclick="mostrarTab('params')"   id="tab-params"   class="pb-3 px-1 text-blue-700 border-b-2 border-blue-700 font-medium text-sm">Parametros</button>
        <button onclick="mostrarTab('usuarios')" id="tab-usuarios" class="pb-3 px-1 text-gray-500 hover:text-gray-700 text-sm">Usuarios</button>
    </div>

    <!-- Parametros -->
    <div id="tab-params-content">
        <div class="bg-white rounded-xl shadow p-6 max-w-lg">
            <h3 class="font-semibold text-blue-800 mb-5">Parametros del sistema</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-600">Nombre de la institucion</label>
                    <input id="pNombreInst" type="text" class="w-full border rounded px-3 py-2 mt-1">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-600">Domicilio</label>
                        <input id="pDomicilio" type="text" class="w-full border rounded px-3 py-2 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-gray-600">Telefono</label>
                        <input id="pTelefono" type="text" class="w-full border rounded px-3 py-2 mt-1">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-600">Localidad</label>
                        <input id="pLocalidad" type="text" class="w-full border rounded px-3 py-2 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-gray-600">Provincia</label>
                        <input id="pProvincia" type="text" class="w-full border rounded px-3 py-2 mt-1">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-600">Email</label>
                        <input id="pEmail" type="email" class="w-full border rounded px-3 py-2 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-gray-600">URL Logo</label>
                        <input id="pLogo" type="text" class="w-full border rounded px-3 py-2 mt-1">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-600">Mes cobranza actual</label>
                        <input id="pMes" type="number" min="1" max="12" class="w-full border rounded px-3 py-2 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-gray-600">Anio cobranza</label>
                        <input id="pAnio" type="number" class="w-full border rounded px-3 py-2 mt-1">
                    </div>
                </div>
            </div>
            <div id="paramMsg" class="mt-3 text-sm hidden"></div>
            <input type="hidden" id="pId">
            <button onclick="guardarParams()" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium">Guardar</button>
        </div>
    </div>

    <!-- Usuarios -->
    <div id="tab-usuarios-content" class="hidden">
        <div class="flex justify-between items-center mb-4">
            <p class="text-gray-500 text-sm">Gestion de usuarios del sistema</p>
            <button onclick="abrirModalUsuario()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">+ Nuevo usuario</button>
        </div>
        <div class="bg-white rounded-xl shadow overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-blue-50 text-blue-800">
                    <tr>
                        <th class="px-4 py-3 text-left">Usuario</th>
                        <th class="px-4 py-3 text-left">Nombre</th>
                        <th class="px-4 py-3 text-left">Rol</th>
                        <th class="px-4 py-3 text-left">Estado</th>
                        <th class="px-4 py-3 text-left">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuarios" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal usuario -->
<div id="modalUsuario" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
        <h3 class="text-xl font-bold text-blue-900 mb-6">Nuevo Usuario</h3>
        <div class="space-y-4">
            <div>
                <label class="text-xs text-gray-500">Username *</label>
                <input id="uUsername" type="text" class="mt-1 w-full border rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="text-xs text-gray-500">Nombre completo</label>
                <input id="uNombre" type="text" class="mt-1 w-full border rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="text-xs text-gray-500">Contrasena temporal</label>
                <input id="uPass" type="password" class="mt-1 w-full border rounded px-3 py-2 text-sm" placeholder="Por defecto: admin123">
            </div>
            <div>
                <label class="text-xs text-gray-500">Rol</label>
                <select id="uRol" class="mt-1 w-full border rounded px-3 py-2 text-sm">
                    <option value="ADMIN">Admin</option>
                    <option value="OPERADOR">Operador</option>
                </select>
            </div>
        </div>
        <div id="usuarioError" class="text-red-600 text-sm mt-3 hidden"></div>
        <div class="flex justify-end gap-3 mt-6">
            <button onclick="document.getElementById('modalUsuario').classList.add('hidden')" class="px-5 py-2 border rounded-lg text-gray-600">Cancelar</button>
            <button onclick="crearUsuario()" class="px-5 py-2 bg-blue-600 text-white rounded-lg font-medium">Crear</button>
        </div>
    </div>
</div>

<script>
async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login';}
fetch('/api/auth/me').then(r=>r.json()).then(u=>{
    if(!u.id){window.location.href='/login';return;}
    document.getElementById('userInfo').textContent=u.nombre+' ('+u.rol+')';
    cargarParams();cargarUsuarios();
});
function mostrarTab(tab){
    ['params','usuarios'].forEach(t=>{
        document.getElementById('tab-'+t+'-content').classList.add('hidden');
        document.getElementById('tab-'+t).className='pb-3 px-1 text-gray-500 hover:text-gray-700 text-sm';
    });
    document.getElementById('tab-'+tab+'-content').classList.remove('hidden');
    document.getElementById('tab-'+tab).className='pb-3 px-1 text-blue-700 border-b-2 border-blue-700 font-medium text-sm';
}
async function cargarParams(){
    const data=await fetch('/api/admin/parametros').then(r=>r.json());
    document.getElementById('pId').value=data.id_parametro||1;
    document.getElementById('pNombreInst').value=data.nombre_institucion||'';
    document.getElementById('pDomicilio').value=data.domicilio||'';
    document.getElementById('pTelefono').value=data.telefono||'';
    document.getElementById('pLocalidad').value=data.localidad||'';
    document.getElementById('pProvincia').value=data.provincia||'';
    document.getElementById('pEmail').value=data.email||'';
    document.getElementById('pLogo').value=data.logo_url||'';
    document.getElementById('pMes').value=data.mes_cobranza||1;
    document.getElementById('pAnio').value=data.anio_cobranza||2025;
}
async function guardarParams(){
    const msgEl=document.getElementById('paramMsg');
    const payload={
        id_parametro:parseInt(document.getElementById('pId').value)||1,
        nombre_institucion:document.getElementById('pNombreInst').value,
        domicilio:document.getElementById('pDomicilio').value,
        telefono:document.getElementById('pTelefono').value,
        localidad:document.getElementById('pLocalidad').value,
        provincia:document.getElementById('pProvincia').value,
        email:document.getElementById('pEmail').value,
        logo_url:document.getElementById('pLogo').value,
        mes_cobranza:parseInt(document.getElementById('pMes').value)||1,
        anio_cobranza:parseInt(document.getElementById('pAnio').value)||2025
    };
    const res=await fetch('/api/admin/parametros',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(!res.ok){msgEl.textContent=data.error||'Error';msgEl.className='mt-3 text-sm text-red-600';msgEl.classList.remove('hidden');return;}
    msgEl.textContent='Guardado correctamente';msgEl.className='mt-3 text-sm text-green-700';msgEl.classList.remove('hidden');
    setTimeout(()=>msgEl.classList.add('hidden'),2000);
}
async function cargarUsuarios(){
    const data=await fetch('/api/admin/usuarios').then(r=>r.json());
    const tbody=document.getElementById('tablaUsuarios');
    tbody.innerHTML='';
    (data||[]).forEach(u=>{
        const actCls=u.activo?'bg-green-100 text-green-700':'bg-gray-100 text-gray-500';
        tbody.innerHTML+=`<tr class="hover:bg-gray-50">
            <td class="px-4 py-3 font-mono">${u.username}</td>
            <td class="px-4 py-3">${u.nombre||''}</td>
            <td class="px-4 py-3 text-blue-700 font-medium">${u.rol}</td>
            <td class="px-4 py-3"><span class="px-2 py-0.5 rounded-full text-xs ${actCls}">${u.activo?'Activo':'Inactivo'}</span></td>
            <td class="px-4 py-3 space-x-2">
                <button onclick="resetPass(${u.id_usuario})" class="text-blue-600 hover:underline text-xs">Reset pass</button>
                <button onclick="toggleUsuario(${u.id_usuario},${u.activo})" class="text-gray-500 hover:underline text-xs">${u.activo?'Desactivar':'Activar'}</button>
            </td>
        </tr>`;
    });
}
function abrirModalUsuario(){
    document.getElementById('uUsername').value='';document.getElementById('uNombre').value='';
    document.getElementById('uPass').value='';document.getElementById('uRol').value='OPERADOR';
    document.getElementById('usuarioError').classList.add('hidden');
    document.getElementById('modalUsuario').classList.remove('hidden');
}
async function crearUsuario(){
    const payload={username:document.getElementById('uUsername').value,nombre:document.getElementById('uNombre').value,password:document.getElementById('uPass').value||'admin123',rol:document.getElementById('uRol').value};
    if(!payload.username){document.getElementById('usuarioError').textContent='Username requerido';document.getElementById('usuarioError').classList.remove('hidden');return;}
    const res=await fetch('/api/admin/usuarios',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(!res.ok){document.getElementById('usuarioError').textContent=data.error||'Error';document.getElementById('usuarioError').classList.remove('hidden');return;}
    document.getElementById('modalUsuario').classList.add('hidden');cargarUsuarios();
}
async function resetPass(id){
    const pw=prompt('Nueva contrasena (dejar vacio para admin123):','');
    if(pw===null)return;
    const res=await fetch('/api/admin/usuarios/'+id+'/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw||'admin123'})});
    const data=await res.json();
    alert(data.ok?'Contrasena actualizada':data.error||'Error');
}
async function toggleUsuario(id,activo){
    const res=await fetch('/api/admin/usuarios/'+id+'/estado',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({activo:!activo})});
    const data=await res.json();
    if(!data.ok)alert(data.error||'Error');else cargarUsuarios();
}
</script>
</body>
</html>
