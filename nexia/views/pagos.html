<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexia - Pagos</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">
<aside class="w-64 bg-blue-900 text-white flex flex-col min-h-screen fixed">
    <div class="p-6 border-b border-blue-700">
        <h1 class="text-2xl font-bold">NEXIA</h1>
        <p class="text-blue-300 text-xs mt-1">Cooperadora Escolar</p>
    </div>
    <nav class="flex-1 p-4 space-y-1">
        <a href="/dashboard"    class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#127968; Dashboard</a>
        <a href="/familias"     class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128106; Familias</a>
        <a href="/talones"      class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#129534; Talones</a>
        <a href="/pagos"        class="flex items-center gap-3 px-4 py-2 rounded-lg bg-blue-700 font-medium">&#128179; Pagos</a>
        <a href="/conceptos"    class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128194; Conceptos</a>
        <a href="/contabilidad" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128202; Contabilidad</a>
        <a href="/admin"        class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#9881; Admin</a>
    </nav>
    <div class="p-4 border-t border-blue-700">
        <span id="userInfo" class="text-blue-300 text-sm"></span>
        <button onclick="logout()" class="mt-2 w-full text-left text-sm text-red-300 hover:text-red-200">Cerrar sesion</button>
    </div>
</aside>
<main class="ml-64 flex-1 p-8">
    <h2 class="text-2xl font-bold text-blue-900 mb-6">Pagos</h2>

    <!-- Registrar pago -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
        <h3 class="font-semibold text-gray-700 mb-4">Registrar cobro por codigo de barra</h3>
        <div class="flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-48">
                <label class="text-xs text-gray-500">Codigo de barra</label>
                <input id="codigoBarra" type="text" class="mt-1 w-full border rounded px-3 py-2 font-mono" placeholder="Scan o ingresar manualmente" autofocus>
            </div>
            <div>
                <label class="text-xs text-gray-500">Medio de pago</label>
                <select id="medioPago" class="mt-1 border rounded px-3 py-2 text-sm">
                    <option value="EFECTIVO">Efectivo</option>
                    <option value="TRANSFERENCIA">Transferencia</option>
                    <option value="MERCADOPAGO">Mercado Pago</option>
                    <option value="OTRO">Otro</option>
                </select>
            </div>
            <div class="flex-1 min-w-40">
                <label class="text-xs text-gray-500">Observaciones</label>
                <input id="obsInput" type="text" class="mt-1 w-full border rounded px-3 py-2 text-sm">
            </div>
            <button onclick="registrarPago()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium">Registrar</button>
        </div>
        <div id="pagoMsg" class="mt-3 text-sm hidden"></div>
    </div>

    <!-- Filtros y lista -->
    <div class="bg-white rounded-xl shadow p-4 mb-4 flex flex-wrap gap-4 items-end">
        <div>
            <label class="text-xs text-gray-500">Mes</label>
            <select id="filtroMes" class="mt-1 border rounded px-3 py-2 text-sm">
                <option value="">Todos</option>
                <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
            </select>
        </div>
        <div>
            <label class="text-xs text-gray-500">Anio</label>
            <input id="filtroAnio" type="number" class="mt-1 border rounded px-3 py-2 text-sm w-24">
        </div>
        <button onclick="cargarPagos()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded text-sm">Filtrar</button>
        <button onclick="cargarResumenMedio()" class="bg-blue-100 hover:bg-blue-200 text-blue-800 px-4 py-2 rounded text-sm">Ver resumen por medio</button>
    </div>

    <!-- Resumen medios -->
    <div id="resumenMedios" class="grid grid-cols-4 gap-4 mb-4 hidden"></div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-blue-50 text-blue-800">
                <tr>
                    <th class="px-4 py-3 text-left">Familia</th>
                    <th class="px-4 py-3 text-left">Tutor</th>
                    <th class="px-4 py-3 text-left">Concepto</th>
                    <th class="px-4 py-3 text-left">Fecha</th>
                    <th class="px-4 py-3 text-left">Medio</th>
                    <th class="px-4 py-3 text-right">Monto</th>
                    <th class="px-4 py-3 text-left">Obs</th>
                </tr>
            </thead>
            <tbody id="tablaPagos" class="divide-y divide-gray-100"></tbody>
        </table>
        <p id="sinPagos" class="text-center text-gray-400 py-8 hidden">Sin pagos para el periodo seleccionado</p>
    </div>
</main>
<script>
async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login';}
fetch('/api/auth/me').then(r=>r.json()).then(u=>{
    if(!u.id){window.location.href='/login';return;}
    document.getElementById('userInfo').textContent=u.nombre+' ('+u.rol+')';
    const ahora=new Date();
    document.getElementById('filtroMes').value=ahora.getMonth()+1;
    document.getElementById('filtroAnio').value=ahora.getFullYear();
    cargarPagos();
    document.getElementById('codigoBarra').addEventListener('keydown', e=>{if(e.key==='Enter')registrarPago();});
});
async function registrarPago(){
    const codigo=document.getElementById('codigoBarra').value.trim();
    const medio=document.getElementById('medioPago').value;
    const obs=document.getElementById('obsInput').value.trim();
    const msgEl=document.getElementById('pagoMsg');
    if(!codigo){msgEl.textContent='Ingrese el codigo de barra';msgEl.className='mt-3 text-sm text-red-600';msgEl.classList.remove('hidden');return;}
    const res=await fetch('/api/pagos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({codigo_barra:codigo,medio_pago:medio,observaciones:obs})});
    const data=await res.json();
    if(!res.ok){msgEl.textContent=data.error||'Error al registrar';msgEl.className='mt-3 text-sm text-red-600';msgEl.classList.remove('hidden');return;}
    msgEl.textContent='Pago registrado correctamente';
    msgEl.className='mt-3 text-sm text-green-700 font-semibold';msgEl.classList.remove('hidden');
    document.getElementById('codigoBarra').value='';document.getElementById('obsInput').value='';
    document.getElementById('codigoBarra').focus();
    cargarPagos();
    setTimeout(()=>msgEl.classList.add('hidden'),3000);
}
async function cargarPagos(){
    const mes=document.getElementById('filtroMes').value;
    const anio=document.getElementById('filtroAnio').value;
    const p=new URLSearchParams();
    if(mes)p.set('mes',mes);if(anio)p.set('anio',anio);
    const data=await fetch('/api/pagos?'+p).then(r=>r.json());
    const tbody=document.getElementById('tablaPagos');
    const sinP=document.getElementById('sinPagos');
    tbody.innerHTML='';
    if(!Array.isArray(data)||!data.length){sinP.classList.remove('hidden');return;}
    sinP.classList.add('hidden');
    const medioCls={'EFECTIVO':'bg-green-100 text-green-700','TRANSFERENCIA':'bg-blue-100 text-blue-700','MERCADOPAGO':'bg-indigo-100 text-indigo-700','OTRO':'bg-gray-100 text-gray-600'};
    data.forEach(p=>{
        const monto=Number(p.monto).toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0});
        const mc=medioCls[p.medio_pago]||'bg-gray-100 text-gray-600';
        tbody.innerHTML+=`<tr class="hover:bg-gray-50">
            <td class="px-4 py-2 font-bold">${p.numero_familia}</td>
            <td class="px-4 py-2">${p.nombre_tutor_principal||'-'}</td>
            <td class="px-4 py-2">${p.nombre_concepto||'-'}</td>
            <td class="px-4 py-2 text-gray-500">${p.fecha_pago}</td>
            <td class="px-4 py-2"><span class="px-2 py-0.5 rounded-full text-xs ${mc}">${p.medio_pago}</span></td>
            <td class="px-4 py-2 text-right font-mono font-semibold">${monto}</td>
            <td class="px-4 py-2 text-gray-400 text-xs">${p.observaciones||''}</td>
        </tr>`;
    });
}
async function cargarResumenMedio(){
    const mes=document.getElementById('filtroMes').value;
    const anio=document.getElementById('filtroAnio').value;
    const p=new URLSearchParams();
    if(mes)p.set('mes',mes);if(anio)p.set('anio',anio);
    const data=await fetch('/api/pagos/resumen/medio-pago?'+p).then(r=>r.json());
    const sec=document.getElementById('resumenMedios');
    sec.innerHTML='';
    sec.classList.remove('hidden');
    const colores={'EFECTIVO':'border-green-500 text-green-700','TRANSFERENCIA':'border-blue-500 text-blue-700','MERCADOPAGO':'border-indigo-500 text-indigo-700','OTRO':'border-gray-400 text-gray-600'};
    (data||[]).forEach(r=>{
        const cls=colores[r.medio_pago]||'border-gray-400 text-gray-600';
        const monto=Number(r.total).toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0});
        sec.innerHTML+=`<div class="bg-white rounded-xl shadow p-4 border-l-4 ${cls}">
            <p class="text-xs text-gray-500">${r.medio_pago}</p>
            <p class="text-xl font-bold mt-1 ${cls.split(' ')[1]}">${monto}</p>
            <p class="text-xs text-gray-400">${r.cantidad} pagos</p>
        </div>`;
    });
}
</script>
</body>
</html>
