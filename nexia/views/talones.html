<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexia - Talones</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex">
<!-- Sidebar -->
<aside class="w-64 bg-blue-900 text-white flex flex-col min-h-screen fixed">
    <div class="p-6 border-b border-blue-700">
        <h1 class="text-2xl font-bold">NEXIA</h1>
        <p class="text-blue-300 text-xs mt-1">Cooperadora Escolar</p>
    </div>
    <nav class="flex-1 p-4 space-y-1">
        <a href="/dashboard"    class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#127968; Dashboard</a>
        <a href="/familias"     class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128106; Familias</a>
        <a href="/talones"      class="flex items-center gap-3 px-4 py-2 rounded-lg bg-blue-700 font-medium">&#129534; Talones</a>
        <a href="/pagos"        class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128179; Pagos</a>
        <a href="/conceptos"    class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128194; Conceptos</a>
        <a href="/contabilidad" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#128202; Contabilidad</a>
        <a href="/admin"        class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-blue-700">&#9881; Admin</a>
    </nav>
    <div class="p-4 border-t border-blue-700">
        <span id="userInfo" class="text-blue-300 text-sm"></span>
        <button onclick="logout()" class="mt-2 w-full text-left text-sm text-red-300 hover:text-red-200">Cerrar sesi&oacute;n</button>
    </div>
</aside>
<main class="ml-64 flex-1 p-8">
    <h2 class="text-2xl font-bold text-blue-900 mb-6">Talones</h2>
    <div class="flex flex-wrap gap-3 mb-6">
        <button onclick="abrirModalGenerar()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium">Generar cuotas mensuales</button>
        <button onclick="abrirModalExtra()" class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2 rounded-lg font-medium">+ Tal&oacute;n extra</button>
    </div>
    <div class="bg-white rounded-xl shadow p-4 mb-6 flex flex-wrap gap-4 items-end">
        <div>
            <label class="text-xs text-gray-500">Mes</label>
            <select id="filtroMes" class="mt-1 border rounded px-3 py-2 text-sm">
                <option value="">Todos</option>
                <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
            </select>
        </div>
        <div>
            <label class="text-xs text-gray-500">A&ntilde;o</label>
            <input id="filtroAnio" type="number" class="mt-1 border rounded px-3 py-2 text-sm w-24" placeholder="2025">
        </div>
        <div>
            <label class="text-xs text-gray-500">Concepto</label>
            <select id="filtroConcepto" class="mt-1 border rounded px-3 py-2 text-sm">
                <option value="">Todos</option>
            </select>
        </div>
        <button onclick="cargarTalones()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded text-sm">Filtrar</button>
    </div>
    <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-blue-50 text-blue-800">
                <tr>
                    <th class="px-4 py-3 text-left">Familia</th>
                    <th class="px-4 py-3 text-left">Tutor</th>
                    <th class="px-4 py-3 text-left">Concepto</th>
                    <th class="px-4 py-3 text-left">Per&iacute;odo</th>
                    <th class="px-4 py-3 text-right">Monto</th>
                    <th class="px-4 py-3 text-left">C&oacute;digo barra</th>
                    <th class="px-4 py-3 text-left">Estado</th>
                    <th class="px-4 py-3 text-left">Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaTalones" class="divide-y divide-gray-100"></tbody>
        </table>
        <p id="sinResultados" class="text-center text-gray-400 py-8 hidden">Sin resultados para el filtro seleccionado</p>
    </div>
</main>
<div id="modalGenerar" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
        <h3 class="text-xl font-bold text-blue-900 mb-6">Generar Cuotas Mensuales</h3>
        <div class="space-y-4">
            <div>
                <label class="text-xs text-gray-500">Mes *</label>
                <select id="genMes" class="mt-1 w-full border rounded px-3 py-2 text-sm">
                    <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
                    <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
                    <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
                    <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-gray-500">A&ntilde;o *</label>
                <input id="genAnio" type="number" class="mt-1 w-full border rounded px-3 py-2 text-sm" value="2025">
            </div>
        </div>
        <div id="genError" class="text-red-600 text-sm mt-3 hidden"></div>
        <div id="genMsg" class="text-green-700 text-sm mt-3 hidden"></div>
        <div class="flex justify-end gap-3 mt-6">
            <button onclick="document.getElementById('modalGenerar').classList.add('hidden')" class="px-5 py-2 border rounded-lg text-gray-600">Cancelar</button>
            <button onclick="generarTalones()" id="btnGenerar" class="px-5 py-2 bg-blue-600 text-white rounded-lg font-medium">Generar</button>
        </div>
    </div>
</div>
<div id="modalExtra" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
        <h3 class="text-xl font-bold text-purple-800 mb-6">Nuevo Tal&oacute;n Extra</h3>
        <div class="space-y-4">
            <div>
                <label class="text-xs text-gray-500">Familia *</label>
                <select id="extraFamilia" class="mt-1 w-full border rounded px-3 py-2 text-sm"></select>
            </div>
            <div>
                <label class="text-xs text-gray-500">Concepto *</label>
                <select id="extraConcepto" class="mt-1 w-full border rounded px-3 py-2 text-sm"></select>
            </div>
            <div>
                <label class="text-xs text-gray-500">Monto *</label>
                <input id="extraMonto" type="number" min="0" class="mt-1 w-full border rounded px-3 py-2 text-sm">
            </div>
            <div>
                <label class="text-xs text-gray-500">Observaciones</label>
                <input id="extraObs" type="text" class="mt-1 w-full border rounded px-3 py-2 text-sm">
            </div>
        </div>
        <div id="extraError" class="text-red-600 text-sm mt-3 hidden"></div>
        <div class="flex justify-end gap-3 mt-6">
            <button onclick="document.getElementById('modalExtra').classList.add('hidden')" class="px-5 py-2 border rounded-lg text-gray-600">Cancelar</button>
            <button onclick="generarExtra()" class="px-5 py-2 bg-purple-600 text-white rounded-lg font-medium">Crear tal&oacute;n</button>
        </div>
    </div>
</div>
<script>
async function logout(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login';}
fetch('/api/auth/me').then(r=>r.json()).then(u=>{
    if(!u.id){window.location.href='/login';return;}
    document.getElementById('userInfo').textContent=u.nombre+' ('+u.rol+')';
    const ahora=new Date();
    document.getElementById('filtroMes').value=ahora.getMonth()+1;
    document.getElementById('filtroAnio').value=ahora.getFullYear();
    document.getElementById('genMes').value=ahora.getMonth()+1;
    document.getElementById('genAnio').value=ahora.getFullYear();
    cargarConceptos();cargarTalones();
});
let conceptosCache=[];
async function cargarConceptos(){
    conceptosCache=await fetch('/api/conceptos').then(r=>r.json());
    const sel=document.getElementById('filtroConcepto');
    sel.innerHTML='<option value="">Todos</option>';
    const selE=document.getElementById('extraConcepto');
    selE.innerHTML='';
    (conceptosCache||[]).filter(c=>c.activo).forEach(c=>{
        sel.innerHTML+=`<option value="${c.id_concepto}">${c.nombre}</option>`;
        selE.innerHTML+=`<option value="${c.id_concepto}">${c.nombre}</option>`;
    });
}
async function cargarTalones(){
    const mes=document.getElementById('filtroMes').value;
    const anio=document.getElementById('filtroAnio').value;
    const conc=document.getElementById('filtroConcepto').value;
    const p=new URLSearchParams();
    if(mes)p.set('mes',mes);if(anio)p.set('anio',anio);if(conc)p.set('id_concepto',conc);
    const data=await fetch('/api/talones?'+p).then(r=>r.json());
    const tbody=document.getElementById('tablaTalones');
    const sinRes=document.getElementById('sinResultados');
    tbody.innerHTML='';
    if(!Array.isArray(data)||!data.length){sinRes.classList.remove('hidden');return;}
    sinRes.classList.add('hidden');
    const meses=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    data.forEach(t=>{
        const ec=t.estado==='PAGADO'?'bg-green-100 text-green-700':t.estado==='ANULADO'?'bg-gray-100 text-gray-400':' bg-yellow-100 text-yellow-700';
        const periodo=t.mes?(meses[t.mes]+' '+t.anio):(t.anio||'');
        const monto=Number(t.monto).toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0});
        tbody.innerHTML+=`<tr class="hover:bg-gray-50">
            <td class="px-4 py-2 font-bold">${t.numero_familia}</td>
            <td class="px-4 py-2">${t.nombre_tutor_principal||'-'}</td>
            <td class="px-4 py-2">${t.nombre_concepto||'-'}</td>
            <td class="px-4 py-2 text-gray-500">${periodo}</td>
            <td class="px-4 py-2 text-right font-mono">${monto}</td>
            <td class="px-4 py-2 font-mono text-xs">${t.codigo_barra}</td>
            <td class="px-4 py-2"><span class="px-2 py-0.5 rounded-full text-xs ${ec}">${t.estado}</span></td>
            <td class="px-4 py-2">${t.estado==='PENDIENTE'?`<button onclick="anularTalon(${t.id_talon})" class="text-red-400 hover:text-red-600 text-xs">Anular</button>`:''}</td>
        </tr>`;
    });
}
function abrirModalGenerar(){
    document.getElementById('genError').classList.add('hidden');
    document.getElementById('genMsg').classList.add('hidden');
    document.getElementById('modalGenerar').classList.remove('hidden');
}
async function generarTalones(){
    const mes=parseInt(document.getElementById('genMes').value);
    const anio=parseInt(document.getElementById('genAnio').value);
    const btn=document.getElementById('btnGenerar');
    btn.disabled=true;btn.textContent='Generando...';
    const res=await fetch('/api/talones/generar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mes,anio})});
    const data=await res.json();
    btn.disabled=false;btn.textContent='Generar';
    if(!res.ok){document.getElementById('genError').textContent=data.error||'Error';document.getElementById('genError').classList.remove('hidden');return;}
    document.getElementById('genMsg').textContent=data.mensaje||'Generados: '+data.generados;
    document.getElementById('genMsg').classList.remove('hidden');
    setTimeout(()=>{document.getElementById('modalGenerar').classList.add('hidden');cargarTalones();},1500);
}
async function abrirModalExtra(){
    const familias=await fetch('/api/familias?estado=ACTIVA').then(r=>r.json());
    const sel=document.getElementById('extraFamilia');
    sel.innerHTML='';
    (familias||[]).forEach(f=>{sel.innerHTML+=`<option value="${f.id_familia}">${f.numero_familia} - ${f.nombre_tutor_principal||''}</option>`;});
    document.getElementById('extraError').classList.add('hidden');
    document.getElementById('extraMonto').value='';
    document.getElementById('extraObs').value='';
    document.getElementById('modalExtra').classList.remove('hidden');
}
async function generarExtra(){
    const payload={
        id_familia:parseInt(document.getElementById('extraFamilia').value),
        id_concepto:parseInt(document.getElementById('extraConcepto').value),
        monto:parseFloat(document.getElementById('extraMonto').value),
        observaciones:document.getElementById('extraObs').value
    };
    if(!payload.monto){document.getElementById('extraError').textContent='El monto es requerido';document.getElementById('extraError').classList.remove('hidden');return;}
    const res=await fetch('/api/talones/generar-extra',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(!res.ok){document.getElementById('extraError').textContent=data.error||'Error';document.getElementById('extraError').classList.remove('hidden');return;}
    document.getElementById('modalExtra').classList.add('hidden');cargarTalones();
}
async function anularTalon(id){
    if(!confirm('Anular este talon?'))return;
    const res=await fetch('/api/talones/'+id+'/anular',{method:'POST'});
    const data=await res.json();
    if(!data.ok)alert(data.error||'Error');else cargarTalones();
}
</script>
</body>
</html>
